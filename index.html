    <script>
      /** 
       * Enterprise Polyfill: 
       * Ensures 'process' and 'env' exist for libraries (React-Router, Recharts) 
       * that expect a Node-like environment even when running via CDN.
       */
      window.process = window.process || { 
        env: { NODE_ENV: 'development' },
        browser: true 
      };
    </script>
