<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>Nexus Core | Enterprise IWMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      /** 
       * Enterprise Polyfill: 
       * Ensures 'process' and 'env' exist for libraries (React-Router, Recharts) 
       * that expect a Node-like environment even when running via CDN.
       */
      window.process = window.process || { 
        env: { NODE_ENV: 'development' },
        browser: true 
      };
    </script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
